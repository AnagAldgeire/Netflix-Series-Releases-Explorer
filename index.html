<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>D3 World Map (NaturalEarth1 + fit)</title>
  <style>
    :root { color-scheme: light dark; }
    body { margin: 0; font-family: system-ui, -apple-system, Arial, sans-serif; }
    #wrap { width: 100%; height: 100vh; }
    svg { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <div id="wrap"></div>

  <!-- D3 v7 -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script>
    const container = document.getElementById("wrap");

    // Create responsive SVG
    const svg = d3.select(container).append("svg")
      .attr("role", "img")
      .attr("aria-label", "World map");

    const g = svg.append("g");

    // Projection + path (NaturalEarth1)
    const projection = d3.geoNaturalEarth1();
    const path = d3.geoPath(projection);

    // Basic styling
    const style = {
      landFill: "#d9d9d9",
      landStroke: "#666",
      landStrokeWidth: 0.5,
      background: "transparent"
    };

    // Utility: get container size
    function getSize() {
      const { width, height } = container.getBoundingClientRect();
      // Avoid 0 sizes (e.g., hidden container)
      return {
        width: Math.max(1, Math.floor(width)),
        height: Math.max(1, Math.floor(height))
      };
    }

    // Fit projection to current size and redraw paths
    function render(geojson) {
      const { width, height } = getSize();

      svg
        .attr("viewBox", `0 0 ${width} ${height}`)
        .attr("preserveAspectRatio", "xMidYMid meet")
        .style("background", style.background);

      // Fit with a bit of padding
      const padding = 10;
      projection.fitExtent(
        [[padding, padding], [width - padding, height - padding]],
        geojson
      );

      // Bind and draw
      const features = (geojson.type === "FeatureCollection")
        ? geojson.features
        : [geojson];

      const countries = g.selectAll("path.land")
        .data(features, (d, i) => d.id ?? d.properties?.name ?? i);

      countries.join(
        enter => enter.append("path")
          .attr("class", "land")
          .attr("fill", style.landFill)
          .attr("stroke", style.landStroke)
          .attr("stroke-width", style.landStrokeWidth)
          .attr("d", path),
        update => update.attr("d", path),
        exit => exit.remove()
      );
    }

    // Load local GeoJSON
    let cachedGeo = null;

    d3.json("./world.geojson").then(geojson => {
      cachedGeo = geojson;
      render(geojson);

      // Refit on resize
      let raf = null;
      window.addEventListener("resize", () => {
        if (!cachedGeo) return;
        cancelAnimationFrame(raf);
        raf = requestAnimationFrame(() => render(cachedGeo));
      });
    }).catch(err => {
      console.error(err);
      container.innerHTML = `
        <div style="padding:16px">
          <h2 style="margin:0 0 8px 0">Couldn’t load <code>world.geojson</code></h2>
          <p style="margin:0 0 8px 0">
            Make sure <code>world.geojson</code> is in the same folder as <code>index.html</code>
            and you’re running a local server (not <code>file://</code>).
          </p>
          <pre style="white-space:pre-wrap">${String(err)}</pre>
        </div>
      `;
    });
  </script>
</body>
</html>
